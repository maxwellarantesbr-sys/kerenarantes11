[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = ".next"

[dev]
  command = "npm run dev"
  port = 3000

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Suporte a cache
[[cache]]
  path = ".next/cache"

# Variáveis de ambiente necessárias
# Configure estas no painel do Netlify:
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# NODE_ENV = production
